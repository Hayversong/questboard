<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{{.Name}} - QuestBoard</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <h1><a href="/">QuestBoard</a> / {{.Name}}</h1>
    </header>

    <main>
        <section class="add-card">
            <h2>Novo Card</h2>
            <form action="/cards" method="POST">
                <input type="hidden" name="project_id" value="{{.ID}}">
                <input type="text" name="title" placeholder="O que precisa ser feito?" required>
                <button type="submit">Criar Card</button>
            </form>
        </section>

        <div class="kanban-board">
            <div class="column">
                <h3>Backlog</h3>
                {{range .Cards}}
                    {{if eq .Status "backlog"}}
                        <div class="card">{{.Title}}</div>
                    {{end}}
                {{end}}
            </div>

            <div class="column">
                <h3>Doing</h3>
                {{range .Cards}}
                    {{if eq .Status "doing"}}
                        <div class="card">{{.Title}}</div>
                    {{end}}
                {{end}}
            </div>

            <div class="column">
                <h3>Done</h3>
                {{range .Cards}}
                    {{if eq .Status "done"}}
                        <div class="card">{{.Title}}</div>
                    {{end}}
                {{end}}
            </div>
        </div>
    </main>
</body>
</html>
