<!doctype html>

<html>
    <head>
        <title>QuestBoard</title>
    </head>

    <body>
        <h1>QuestBoard</h1>

        <section>
            <h2>Dashboard</h2>

            <p>Projetos: {{.Stats.Projects}}</p>

            <p>Quests: {{.Stats.Cards}}</p>

            <p>Concluídas: {{.Stats.Done}}</p>

            <p>XP Total: {{.Stats.XP}}</p>
        </section>

        <hr />

        <section>
            <h2>Novo Projeto</h2>

            <form action="/projects" method="POST">
                <input name="name" required />

                <button>Criar</button>
            </form>
        </section>

        <hr />

        {{range .Projects}}

        <div>
            <h2>
                <a href="/project?id={{.ID}}"> {{.Name}} </a>
            </h2>

            <form action="/projects/delete" method="POST">
                <input type="hidden" name="project_id" value="{{.ID}}" />

                <button>Excluir</button>
            </form>
        </div>

        <hr />

        {{end}}
    </body>
</html>
