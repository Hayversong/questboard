<!doctype html>

<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />

        <title>QuestBoard</title>
    </head>

    <body>
        <h1>QuestBoard</h1>

        <section>
            <h2>Novo Projeto</h2>

            <form action="/projects" method="POST">
                <input
                    type="text"
                    name="name"
                    placeholder="Nome do Projeto"
                    required
                />

                <button type="submit">Criar Projeto</button>
            </form>
        </section>

        <hr />

        <p>Projetos:</p>

        {{range .}}

        <div>
            <h2>
                <a href="/project?id={{.ID}}"> {{.Name}} </a>
            </h2>

            <p>📋 Cards: {{len .Cards}}</p>

            <form
                action="/projects/delete"
                method="POST"
                onsubmit="return confirm('Excluir projeto?');"
            >
                <input type="hidden" name="project_id" value="{{.ID}}" />

                <button type="submit">🗑️ Excluir</button>
            </form>
        </div>

        <hr />

        {{end}}
    </body>
</html>
